# =============================================================================
# torchtitan CI/CD Configuration
# =============================================================================
# Central YAML config for all CI scripts. Parsed by ci/lib/common.sh.
# Variable substitution: ${variable} references earlier values in this file.

paths:
  project_root: /home/phuc/workspace/moe/small_prs/pr009_slurm_cicd
  torchtitan_dir: ${project_root}/torchtitan
  venv_dir: ${project_root}/.venv
  ci_dir: ${project_root}/ci
  log_dir: ${project_root}/ci/logs
  state_dir: ${project_root}/ci/state
  data_dir: ${project_root}/ci/data

git:
  branch: dev-updated-again
  remote: origin
  repo_url: git@github.com:NousResearch/torchtitan.git
  github_api_repo: NousResearch/torchtitan

slurm:
  partition: batch
  job_name_prefix: ci-torchtitan
  one_node:
    nodes: 1
    gpus_per_node: 8
    cpus_per_task: 48
    time_limit: "01:30:00"
  two_node:
    nodes: 2
    gpus_per_node: 8
    cpus_per_task: 48
    time_limit: "02:00:00"
  min_idle_nodes_1n: 1
  min_idle_nodes_2n: 2

timeouts:
  unit_tests: 5m
  distributed_tests: 10m
  integration_tests: 30m
  benchmark: 20m

scheduling:
  commit_poll_interval: "*/10 * * * *"
  pr_poll_interval: "*/15 * * * *"
  daily_schedule: "0 2 * * *"
  benchmark_schedule: "0 3 * * *"

tests:
  unit_files:
    - tests/unit_tests/test_activation_checkpoint.py
    - tests/unit_tests/test_checkpoint.py
    - tests/unit_tests/test_dataset_checkpointing.py
    - tests/unit_tests/test_dataset_flux.py
    - tests/unit_tests/test_download_hf_assets.py
    - tests/unit_tests/test_job_config.py
    - tests/unit_tests/test_lr_scheduler.py
    - tests/unit_tests/test_model_converter.py
    - tests/unit_tests/test_permute_indices_kernel.py
    - tests/unit_tests/test_set_determinism.py
    - tests/unit_tests/test_tokenizer.py
    - tests/unit_tests/test_train_spec.py
  distributed:
    deepep:
      module: tests.unit_tests.deepep.test_primus_turbo_flex_token_dispatcher
      ngpu: 8
      rdzv_port: 29501
  integration_suites:
    - name: features
      ngpu: 4
    - name: models
      ngpu: 8

reference_benchmark:
  config: torchtitan/models/qwen3/train_configs/qwen3_30b_a3b_with_deepep.toml
  ngpu: 8
  steps: 20
  timeout: 20m
  extra_args: ""
  regression_threshold_pct: 10

convergence_test:
  enabled: true
  config: torchtitan/models/qwen3/train_configs/qwen3_30b_a3b_with_deepep.toml
  ngpu: 8
  steps: 100
  seed: 42
  dataset_seed: 12345
  timeout: 30m
  seed_checkpoint_dir: ${data_dir}/convergence_seed_checkpoint
  dataset_dir: ${data_dir}/convergence_dataset
  reference_loss_file: ${data_dir}/convergence_reference_loss.json
  tolerance: 0.0

benchmarks:
  - name: qwen3_30b_a3b_deepep
    config: torchtitan/models/qwen3/train_configs/qwen3_30b_a3b_with_deepep.toml
    ngpu: 8
    steps: 20
    metrics: [tps, mfu, tflops, max_memory_gib]
    regression_threshold_pct: 10

gpu_monitoring:
  enabled: true
  sample_interval_sec: 5
  metrics: [utilization.gpu, memory.used, memory.total, temperature.gpu, power.draw]

notifications:
  discord_webhook_url: ""
  discord_mention_on_fail: ""
  notify_on: [failure, success, regression, preemption]

quality:
  pre_commit: true
  coverage_threshold: 0
  shellcheck: true
  run_on: [pr, daily]

log_retention_days: 30

environment:
  ld_library_path_extra:
    - ${venv_dir}/lib/python3.10/site-packages/torch/lib
    - ${venv_dir}/lib/python3.10/site-packages/nvidia/nvshmem/lib
  cuda_device_max_connections: 1
  pytorch_cuda_alloc_conf: "expandable_segments:True"
  nccl_timeout: 1800000
  nccl_debug: WARN
  nccl_socket_ifname: bond0
  omp_num_threads: 4
